name: Build Docker Image

# MK: builds multi-arch image and pushes to ghcr.io
# triggered on version tags and main pushes

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# MK May 2026 — top-level permissions implicitly cascaded `packages: write`
# into any future job added to this workflow. Aikido flagged it as overly
# broad. Scope per-job instead so only build-and-push gets the GHCR write.
permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # MK May 2026 — minimum perms for the build:
    #   contents: read   → actions/checkout@v4
    #   packages: write  → docker/login-action@v3 + push to ghcr.io
    #   actions:  write  → cache-from / cache-to: type=gha (saves ~5-8 min on
    #                      multi-arch builds; without it the cache write fails
    #                      silently and we lose layer reuse between runs)
    permissions:
      contents: read
      packages: write
      actions: write
    steps:
      # NS 2026-05-30 — third-party actions pinned to commit SHA so a re-tag of
      # the moving v4/v3/v5 reference (e.g. action repo compromise) can't smuggle
      # malicious code into the release build. Comments after the SHA are the
      # human-readable tag we resolved from at pin time; dependabot/renovate can
      # bump these via PR.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ghcr.io/pegaprox/pegaprox
          tags: |
            type=match,pattern=v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
